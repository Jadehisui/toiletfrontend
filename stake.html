<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TD2 Staking | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'VT323', monospace;
            background: #0a0a12;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
        }

        /* Simple toilet ASCII art style */
        .toilet-art {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.5rem;
            color: #ffd700;
            line-height: 1.2;
            margin-bottom: 3rem;
            white-space: pre;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .title {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.5rem;
            color: #ffd700;
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.5rem;
            color: #666;
            margin-bottom: 3rem;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid #ffd700;
            padding: 12px 24px;
            margin-bottom: 3rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #ffd700;
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .status-text {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.5rem;
            color: #ffd700;
        }

        .message {
            font-size: 1.3rem;
            color: #888;
            line-height: 1.8;
            margin-bottom: 3rem;
        }

        .message span {
            color: #ffd700;
        }

        .back-btn {
            display: inline-block;
            padding: 15px 40px;
            background: transparent;
            border: 2px solid #ffd700;
            color: #ffd700;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6rem;
            text-decoration: none;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: #ffd700;
            color: #0a0a12;
        }

        .socials {
            margin-top: 3rem;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .socials a {
            color: #444;
            transition: color 0.2s;
        }

        .socials a:hover {
            color: #ffd700;
        }

        .socials svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Subtle grid bg */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255, 215, 0, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 215, 0, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="toilet-art">

|    COMING SOON    |

        <h1 class="title">STAKING</h1>
        <p class="subtitle">is being built</p>

        <div class="status">
            <div class="status-dot"></div>

        </div>

        <p class="message">
            Stake your <span>$TD2</span> and earn rewards.<br>
            The throne is almost ready.
        </p>

        <a href="index.html" class="back-btn">← BACK</a>

</body>
</html>
